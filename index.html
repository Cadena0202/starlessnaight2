<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remember the promise.</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #04060d;
    --blue: #5ab4f0;
    --mustard: #c8a93a;
    --text: rgba(210,225,255,0.75);
    --text-dim: rgba(160,185,220,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh;
    background: var(--deep);
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
    overflow-x: hidden;
    cursor: crosshair;
  }
  canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 180px; opacity: 0.35; pointer-events: none;
  }
  .site-wrap { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    padding: 28px 48px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(90,180,240,0.08);
    opacity: 0; animation: fadein 1.2s ease 0.3s forwards;
  }
  .site-title {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 15px; color: rgba(210,225,255,0.50); letter-spacing: 0.18em;
  }
  nav { display: flex; gap: 36px; align-items: center; }
  nav a {
    font-family: 'Cormorant Garamond', serif; font-size: 12px;
    color: var(--text-dim); text-decoration: none;
    letter-spacing: 0.22em; text-transform: uppercase;
    transition: color 0.3s; position: relative;
  }
  nav a::after {
    content: ''; position: absolute; bottom: -3px; left: 0;
    width: 0; height: 1px; background: var(--mustard);
    transition: width 0.3s; opacity: 0.6;
  }
  nav a:hover { color: rgba(200,210,255,0.80); }
  nav a:hover::after { width: 100%; }
  nav a.active { color: rgba(200,169,58,0.70); }
  .hero {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 48px 60px; text-align: center; position: relative;
  }
  /* コイン */
  .coin-wrap {
    margin-bottom: 44px; opacity: 0;
    animation: fadein 1.4s ease 0.7s forwards;
  }
  .coin {
    width: 52px; height: 52px; border-radius: 50%;
    background: radial-gradient(circle at 38% 38%,
      rgba(220,195,110,0.90) 0%,
      rgba(190,155,60,0.85) 45%,
      rgba(140,105,30,0.80) 100%
    );
    border: 1.5px solid rgba(230,205,130,0.50);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 2px 12px rgba(200,169,58,0.20),
      0 0 30px rgba(200,169,58,0.08),
      inset 0 1px 2px rgba(255,240,180,0.30),
      inset 0 -1px 2px rgba(100,70,10,0.40);
    animation: coinspin 8s ease-in-out infinite;
  }
  @keyframes coinspin {
    0%,100% { transform: rotateY(0deg); }
    45%      { transform: rotateY(80deg); }
    50%      { transform: rotateY(90deg); }
    55%      { transform: rotateY(80deg); }
  }
  .coin-inner {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(230,205,130,0.35);
    display: flex; align-items: center; justify-content: center;
  }
  .coin-letter {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 18px; color: rgba(240,220,160,0.85); line-height: 1;
    text-shadow: 0 1px 2px rgba(100,70,10,0.50);
  }
  .orb {
    width: 7px; height: 7px;
    background: rgba(210,230,255,0.9); border-radius: 50%;
    box-shadow: 0 0 14px 5px rgba(90,180,240,0.45), 0 0 50px 20px rgba(60,140,230,0.15), 0 0 120px 50px rgba(40,100,200,0.07);
    margin-bottom: 48px; opacity: 0;
    animation: fadein 2s ease 1s forwards, orbpulse 4s ease-in-out 3s infinite;
  }
  @keyframes orbpulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.5); }
  }
  .hero-title {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: clamp(10px, 2vw, 13px);
    color: rgba(210,225,255,0.80); letter-spacing: 0.12em;
    line-height: 1.4; margin-bottom: 20px; opacity: 0;
    animation: titlerise 1.6s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
  }
  @keyframes titlerise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 12px; color: rgba(200,169,58,0.50);
    letter-spacing: 0.28em; margin-bottom: 56px; opacity: 0;
    animation: fadein 1.4s ease 1.6s forwards;
  }
  .nav-cards {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    opacity: 0; animation: fadein 1.4s ease 2s forwards;
  }
  .nav-card {
    width: 180px; padding: 28px 20px;
    border: 1px solid rgba(90,180,240,0.12);
    background: rgba(8,16,30,0.60); backdrop-filter: blur(8px);
    text-decoration: none; display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    transition: border-color 0.35s, background 0.35s, transform 0.35s;
    position: relative; overflow: hidden;
  }
  .nav-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(90,180,240,0.04), transparent 60%);
    opacity: 0; transition: opacity 0.35s;
  }
  .nav-card:hover { border-color: rgba(90,180,240,0.28); background: rgba(12,22,42,0.80); transform: translateY(-4px); }
  .nav-card:hover::before { opacity: 1; }
  .nav-card.gold { border-color: rgba(200,169,58,0.12); }
  .nav-card.gold::before { background: linear-gradient(135deg, rgba(200,169,58,0.05), transparent 60%); }
  .nav-card.gold:hover { border-color: rgba(200,169,58,0.28); }
  .card-icon { font-size: 20px; opacity: 0.6; }
  .card-label {
    font-family: 'Cormorant Garamond', serif; font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.25em; text-transform: uppercase;
  }
  .nav-card:hover .card-label { color: rgba(200,215,255,0.70); }
  .nav-card.gold:hover .card-label { color: rgba(200,169,58,0.70); }
  footer {
    padding: 24px 48px;
    border-top: 1px solid rgba(90,180,240,0.06);
    display: flex; align-items: center; justify-content: center; gap: 16px;
    opacity: 0; animation: fadein 1.2s ease 2.4s forwards;
  }
  .footer-line { flex: 1; max-width: 120px; height: 1px; }
  .footer-line.blue { background: linear-gradient(to right, transparent, rgba(90,180,240,0.20)); }
  .footer-line.gold { background: linear-gradient(to left,  transparent, rgba(200,169,58,0.20)); }
  .footer-text {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 11px; color: rgba(160,185,220,0.28); letter-spacing: 0.20em;
  }
  .corner { position: fixed; width: 22px; height: 22px; border-style: solid; z-index: 20; pointer-events: none; }
  .corner-tl { top: 12px; left: 12px;  border-color: rgba(90,180,240,0.22); border-width: 1px 0 0 1px; }
  .corner-tr { top: 12px; right: 12px; border-color: rgba(200,169,58,0.22); border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 12px; left: 12px;  border-color: rgba(200,169,58,0.22); border-width: 0 0 1px 1px; }
  .corner-br { bottom: 12px; right: 12px; border-color: rgba(90,180,240,0.22); border-width: 0 1px 1px 0; }
  @keyframes fadein { to { opacity: 1; } }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="site-wrap">
  <header>
    <div class="site-title">Remember the promise.</div>
    <nav>
      <a href="index.html" class="active">Top</a>
      <a href="diary.html">Log</a>
    </nav>
  </header>

  <main class="hero">
    <div class="coin-wrap">
      <div class="coin">
        <div class="coin-inner">
          <span class="coin-letter">A</span>
        </div>
      </div>
    </div>
    <div class="orb"></div>
    <h1 class="hero-title">Remember the promise.</h1>
    <p class="hero-sub">per mutual accord &nbsp;·&nbsp; 利害の一致、その先へ</p>
    <div class="nav-cards">
      <a href="diary.html" class="nav-card">
        <span class="card-icon">✦</span>
        <span class="card-label">Log / 日記</span>
      </a>
      <a href="diary.html" class="nav-card gold">
        <span class="card-icon">⬡</span>
        <span class="card-label">Archive</span>
      </a>
    </div>
  </main>

  <footer>
    <div class="footer-line blue"></div>
    <span class="footer-text">Remember the promise.</span>
    <div class="footer-line gold"></div>
  </footer>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
function draw(t) {
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;
  const bg = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy, Math.max(W,H) * 0.8);
  bg.addColorStop(0, '#101828'); bg.addColorStop(0.4, '#080e1c'); bg.addColorStop(1, '#03050c');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 5; i++) {
    const prog = ((t * 0.00018 + i / 5) % 1);
    const r = prog * Math.min(W,H) * 0.55 + 10;
    const a = (1 - prog) * 0.13;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(120,175,240,${a})`; ctx.lineWidth = 0.8; ctx.stroke();
  }
  const pillar = ctx.createLinearGradient(cx, 0, cx, H);
  pillar.addColorStop(0, 'rgba(90,160,255,0)');
  pillar.addColorStop(0.5, 'rgba(130,190,255,0.07)');
  pillar.addColorStop(1, 'rgba(90,160,255,0)');
  ctx.fillStyle = pillar; ctx.fillRect(cx - 60, 0, 120, H);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
