<!-- background -->

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

let W,H;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

resize();

window.addEventListener('resize', resize);

const SNOW_COUNT = 55;

const snow = Array.from({length:SNOW_COUNT},()=>({
  x:Math.random(),
  y:Math.random(),
  r:Math.random()*1.8+0.4,
  speed:Math.random()*0.00012+0.00004,
  alpha:Math.random()*0.35+0.08,
  wobble:Math.random()*Math.PI*2,
  wobbleSpeed:Math.random()*0.001+0.0003,
}));

function draw(){

  ctx.clearRect(0,0,W,H);

  const bg = ctx.createLinearGradient(0,0,0,H);

  bg.addColorStop(0,'#0c1019');
  bg.addColorStop(0.5,'#141c2a');
  bg.addColorStop(1,'#1c2636');

  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  for(const p of snow){

    p.y -= p.speed;
    p.wobble += p.wobbleSpeed;

    if(p.y < -0.02){
      p.y = 1.02;
      p.x = Math.random();
    }

    const px = (p.x + Math.sin(p.wobble)*0.018)*W;
    const py = p.y*H;

    ctx.beginPath();
    ctx.arc(px,py,p.r,0,Math.PI*2);

    ctx.fillStyle =
      `rgba(200,220,255,${p.alpha})`;

    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();
</script>

<!-- firebase -->

<script type="module">

import {
  initializeApp
} from "www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyDeO0QZ1wmxGmEcyu9W3SgSos1Y4T-4TYA",

  authDomain: "azul-1a3c9.firebaseapp.com",

  projectId: "azul-1a3c9",

  storageBucket: "azul-1a3c9.firebasestorage.app",

  messagingSenderId: "107176111624",

  appId: "1:107176111624:web:78bc25fbe09bcd3b47ebbd",

  measurementId: "G-N409CFN5J6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const READ_PASSWORD = "remember";
const WRITE_PASSWORD = "azul2024";

let isOwner = false;

function escHtml(str){
  return String(str)
    .replace(/&/g,'&')
    .replace(/</g,'<')
    .replace(/>/g,'>')
    .replace(/"/g,'"');
}

function unlock(){

  const lock =
    document.getElementById('lock-screen');

  lock.style.opacity = '0';

  setTimeout(()=>{

    lock.style.display = 'none';

    document
      .getElementById('main-content')
      .classList.add('visible');

    loadEntries();

  },800);
}

window.checkPassword = function(){

  const val =
    document.getElementById('pw-input').value;

  const err =
    document.getElementById('pw-error');

  if(val === WRITE_PASSWORD){

    isOwner = true;
    unlock();

  }else if(val === READ_PASSWORD){

    isOwner = false;
    unlock();

  }else{

    err.textContent =
      'the key does not fit.';

    document
      .getElementById('pw-input')
      .value = '';

    setTimeout(()=>{
      err.textContent = '';
    },2500);
  }
}

window.addEventListener('keydown',(e)=>{

  if(e.key === 'Enter'){
    window.checkPassword();
  }

});

async function loadEntries(){

  const list =
    document.getElementById('entries-list');

  list.innerHTML =
    '<div class="loading-note">— loading —</div>';

  try{

    const q = query(
      collection(db,'entries'),
      orderBy('createdAt','desc')
    );

    const snap = await getDocs(q);

    list.innerHTML = '';

    if(snap.empty){

      list.innerHTML =
        '<div class="empty-note">— まだ何も書かれていない —</div>';

      return;
    }

    snap.forEach((docSnap)=>{

      const d = docSnap.data();

      const el =
        document.createElement('div');

      el.className = 'entry';

      el.innerHTML = `
        <div class="entry-date">
          ${escHtml(d.date || '')}
        </div>

        <div class="entry-title">
          ${escHtml(d.title || '— 無題 —')}
        </div>

        <div class="entry-body">
          ${escHtml(d.body || '')}
        </div>
      `;

      list.appendChild(el);

    });

  }catch(e){

    console.error(e);

    list.innerHTML =
      '<div class="empty-note">— 読み込みに失敗しました —</div>';
  }
}

</script>
